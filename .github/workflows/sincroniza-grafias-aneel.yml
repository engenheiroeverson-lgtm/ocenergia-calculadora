name: Sincronização de Grafias ANEEL

on:
  schedule:
    # Toda segunda-feira às 06:00 UTC (03:00 em Cuiabá/MT)
    - cron: '0 6 * * 1'
  workflow_dispatch:        # permite rodar manualmente pelo painel

# Necessário para o passo de commit-back conseguir dar push com o GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Executar validador de grafias
        run: python seu_script_aneel.py
        # Se um dia o app trocar de recurso, basta setar a env aqui:
        # env:
        #   ANEEL_RESOURCE_ID: e8717aa8-2521-453f-bf16-fbb9a16eea39

      - name: Subir o resultado como artefato (sempre, p/ inspeção no log)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grafias-aneel
          path: public/grafias-aneel.json
          if-no-files-found: warn

      - name: Commitar grafias se houver mudança
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/grafias-aneel.json
          if git diff --staged --quiet; then
            echo "Sem mudanças nas grafias — nada a commitar."
          else
            git commit -m "chore: sincroniza grafias ANEEL [skip ci]"
            git push
          fi
